services:
  # Spring Boot Application
  spring-app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_BOOT_PORT: ${SPRING_BOOT_PORT:-8080}
    ports:
      - "${SPRING_BOOT_PORT:-8080}:${SPRING_BOOT_PORT:-8080}"
    # No app healthcheck: the image runs on a distroless base with no shell, curl or
    # wget to run an in-container probe. Probe /actuator/health from outside (or from
    # your orchestrator's liveness/readiness checks) instead.
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 768m
    restart: unless-stopped
