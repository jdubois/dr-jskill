# Full stack (Spring Boot JVM + AOT image + PostgreSQL) built from Dockerfile-aot.
#
#   docker compose -f docker-compose-aot.yml up --build
#
# The AOT image adds Spring AOT to the plain JVM image for faster startup, with no
# extra runtime infrastructure and no frozen profile (unlike GraalVM native). See
# references/DOCKER.md ("JVM + AOT").
services:
  # PostgreSQL Database
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data-aot:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mydb"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
    networks:
      - spring-network

  # Spring Boot Application (JVM + Spring AOT)
  spring-app-aot:
    build:
      context: .
      dockerfile: Dockerfile-aot
    environment:
      SPRING_BOOT_PORT: ${SPRING_BOOT_PORT:-8080}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/mydb
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      # Spring AOT is already baked into JAVA_TOOL_OPTIONS in the image; set it
      # explicitly too so `docker inspect` shows the full effective config.
      SPRING_AOT_ENABLED: "true"
    ports:
      - "${SPRING_BOOT_PORT:-8080}:${SPRING_BOOT_PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy
    # No app healthcheck: the image runs on a distroless base with no shell, curl or
    # wget to run an in-container probe. Probe /actuator/health from outside instead.
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 768m
    networks:
      - spring-network
    restart: unless-stopped

volumes:
  postgres-data-aot:
    driver: local

networks:
  spring-network:
    driver: bridge
